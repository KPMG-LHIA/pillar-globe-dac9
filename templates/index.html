<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PILLAR · GloBE/DAC9</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;600&family=Noto+Sans+Mono:wght@400&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --blue:#00338D;--blue-md:#005EB8;--teal:#00B2A9;--yellow:#EAAA00;
      --white:#fff;--gray:#F5F5F5;--border:#D9D9D9;--muted:#767676;--dark:#1A1A1A;
      --sans:'Noto Sans',sans-serif;--mono:'Noto Sans Mono',monospace;
      --red:#C00;--green:#006B65;
    }
    html,body{height:100%;font-family:var(--sans);background:var(--gray);color:var(--dark)}
    body{display:grid;grid-template-rows:64px 1fr 44px;min-height:100vh}

    /* Header */
    header{background:var(--blue);display:flex;align-items:center;justify-content:space-between;padding:0 32px;position:relative}
    header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--yellow)}
    .logo{display:flex;align-items:center;gap:12px}
    .logo img{height:24px;width:auto}
    .logo-sep{width:1px;height:20px;background:rgba(255,255,255,0.2)}
    .logo-name{font-size:0.88rem;font-weight:300;color:rgba(255,255,255,0.85);letter-spacing:0.06em}
    .logo-name strong{font-weight:600;color:#fff}
    .hright{display:flex;align-items:center;gap:14px}
    .huser{font-size:0.75rem;color:rgba(255,255,255,0.7)}
    .hbadge{font-size:0.65rem;font-weight:600;color:var(--blue);background:var(--yellow);padding:3px 10px;border-radius:2px;letter-spacing:0.06em}
    .hlogout{font-size:0.72rem;color:rgba(255,255,255,0.6);text-decoration:none;border:1px solid rgba(255,255,255,0.2);padding:4px 12px;border-radius:2px;transition:all 0.15s}
    .hlogout:hover{color:#fff;border-color:rgba(255,255,255,0.5)}

    /* Main */
    main{padding:24px 32px;display:flex;flex-direction:column;gap:16px;max-width:1100px;margin:0 auto;width:100%}

    /* Card */
    .card{background:var(--white);border:1px solid var(--border);border-radius:4px}
    .card-head{padding:13px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .card-title{font-size:0.75rem;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:0.1em;display:flex;align-items:center;gap:8px}
    .card-title::before{content:'';display:block;width:3px;height:14px;background:var(--yellow);border-radius:2px}
    .card-body{padding:20px}

    /* Batch list */
    .batch-list{display:flex;flex-direction:column;gap:12px}

    /* Single batch row */
    .batch-row{border:1px solid var(--border);border-radius:4px;background:var(--gray);overflow:hidden;transition:border-color 0.15s}
    .batch-row:focus-within{border-color:var(--blue)}
    .batch-header{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--white);border-bottom:1px solid var(--border)}
    .batch-num{font-size:0.65rem;font-weight:600;color:var(--muted);background:var(--gray);border:1px solid var(--border);border-radius:2px;padding:2px 7px;letter-spacing:0.08em;white-space:nowrap}
    .batch-cf-wrap{flex:1}
    .batch-cf-wrap label{display:block;font-size:0.65rem;color:var(--muted);margin-bottom:3px}
    .batch-cf{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:3px;font-family:var(--mono);font-size:0.82rem;color:var(--dark);outline:none;transition:border-color 0.15s;text-transform:uppercase}
    .batch-cf:focus{border-color:var(--blue)}
    .batch-cf::placeholder{color:#bbb}
    .batch-cf.valid{border-color:var(--green);background:#f6fffe}
    .batch-cf.invalid{border-color:var(--red);background:#fff8f8}
    .cf-hint{font-size:0.62rem;margin-top:3px;height:14px;display:flex;align-items:center;gap:4px;transition:color 0.15s}
    .cf-hint.ok{color:var(--green)}
    .cf-hint.err{color:var(--red)}
    .cf-hint.neutral{color:var(--muted)}
    .batch-del{background:none;border:none;color:#bbb;cursor:pointer;font-size:1rem;padding:4px 6px;border-radius:2px;transition:color 0.15s;line-height:1}
    .batch-del:hover{color:var(--red)}

    .batch-body{padding:10px 14px 12px}

    /* Drop zone inside batch */
    .drop{border:2px dashed var(--border);border-radius:3px;padding:16px 14px;text-align:center;cursor:pointer;position:relative;transition:all 0.15s;background:var(--white);margin-bottom:8px}
    .drop:hover,.drop.over{border-color:var(--blue);background:rgba(0,51,141,0.03)}
    .drop input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
    .drop-icon{font-size:1.2rem;margin-bottom:4px;opacity:0.35}
    .drop-text{font-size:0.78rem;color:var(--muted)}
    .drop-text strong{color:var(--blue)}

    /* File list inside batch */
    .flist{display:flex;flex-direction:column;gap:4px}
    .fitem{display:flex;align-items:center;gap:8px;background:var(--white);border:1px solid var(--border);border-radius:3px;padding:5px 10px;font-family:var(--mono);font-size:0.7rem}
    .fitem .fn{flex:1;color:var(--dark);word-break:break-all}
    .fitem .fs{color:var(--muted);white-space:nowrap}
    .fitem .fx{color:#c00;cursor:pointer;padding:0 3px;opacity:0.55;font-size:0.85rem}
    .fitem .fx:hover{opacity:1}

    /* Add batch button */
    .add-batch-btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:3px;border:1px dashed var(--border);font-family:var(--sans);font-size:0.78rem;font-weight:600;cursor:pointer;color:var(--blue);background:transparent;transition:all 0.15s}
    .add-batch-btn:hover{border-color:var(--blue);background:rgba(0,51,141,0.04)}

    /* Action row */
    .brow{display:flex;gap:10px;margin-top:14px}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:9px 20px;border-radius:3px;border:none;font-family:var(--sans);font-size:0.83rem;font-weight:600;cursor:pointer;transition:all 0.15s}
    .btn-p{background:var(--blue);color:#fff}
    .btn-p:hover:not(:disabled){background:var(--blue-md)}
    .btn-p:disabled{opacity:0.35;cursor:not-allowed}
    .btn-g{background:transparent;color:var(--muted);border:1px solid var(--border)}
    .btn-g:hover{border-color:var(--blue);color:var(--blue)}

    /* Steps */
    .steps{display:flex;border:1px solid var(--border);border-radius:3px;overflow:hidden}
    .step{flex:1;padding:9px 14px;text-align:center;border-right:1px solid var(--border);font-size:0.7rem;color:var(--muted);background:var(--gray);transition:all 0.2s}
    .step:last-child{border-right:none}
    .step.done{background:#E6F6F5;color:#006B65}
    .step.active{background:#E6EEF9;color:var(--blue)}
    .step.error{background:#FCE8E8;color:#B00}
    .step-n{font-weight:600;font-size:0.78rem;margin-bottom:2px}

    /* Progress */
    .prog{display:none}
    .prog.on{display:block}
    .sbadge{display:inline-flex;align-items:center;gap:6px;font-size:0.72rem;font-weight:600;padding:3px 12px;border-radius:100px}
    .sbadge.PENDING{background:#FFF8E6;color:#B07800}
    .sbadge.RUNNING{background:#E6EEF9;color:var(--blue)}
    .sbadge.COMPLETED{background:#E6F6F5;color:#006B65}
    .sbadge.FAILED{background:#FCE8E8;color:#B00}
    .spin{width:10px;height:10px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .logbox{background:#1A1A2E;border-radius:3px;padding:12px 14px;font-family:var(--mono);font-size:0.7rem;color:#A8B0C0;max-height:180px;overflow-y:auto;line-height:1.8;white-space:pre-wrap;margin-top:12px}

    /* Output results */
    .results-wrap{margin-top:16px;display:flex;flex-direction:column;gap:12px}
    .result-group{border:1px solid var(--border);border-radius:4px;overflow:hidden}
    .result-group-head{padding:9px 16px;background:var(--gray);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
    .result-group-icon{font-size:0.9rem}
    .result-group-name{font-family:var(--mono);font-size:0.72rem;color:var(--dark);font-weight:600;flex:1}
    .result-group-cf{font-size:0.65rem;color:var(--muted);background:var(--white);border:1px solid var(--border);border-radius:2px;padding:1px 7px;font-family:var(--mono)}
    .result-group-body{padding:12px 16px;display:flex;flex-wrap:wrap;gap:10px}
    .ocard{background:var(--gray);border:1px solid var(--border);border-radius:3px;padding:11px 13px;display:flex;flex-direction:column;gap:4px;min-width:180px}
    .otype{font-size:0.6rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--teal)}
    .oname{font-family:var(--mono);font-size:0.68rem;color:var(--dark);word-break:break-all;line-height:1.4}
    .odl{display:inline-flex;align-items:center;gap:5px;margin-top:4px;font-size:0.76rem;font-weight:600;color:var(--blue);text-decoration:none}
    .odl:hover{text-decoration:underline}

    /* Footer */
    footer{background:var(--white);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 32px;font-size:0.68rem;color:var(--muted)}
    .fdot{width:5px;height:5px;border-radius:50%;background:var(--teal);display:inline-block;margin-right:7px;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  </style>
</head>

<script>
// ── Stato ──────────────────────────────────────────────────────────────────
const DEFAULT_CF = "{{ default_cf }}";
let batches = [];   // [{id, cf, files:[File]}]
let batchIdSeq = 0;
let jid = null, poll = null, llen = 0;

// ── Init ──────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => { addBatch(); });

// ── Batch management ──────────────────────────────────────────────────────
function addBatch() {
  const id = ++batchIdSeq;
  batches.push({ id, cf: DEFAULT_CF, files: [] });
  renderBatches();
}

function removeBatch(id) {
  if (batches.length === 1) return; // keep at least one
  batches = batches.filter(b => b.id !== id);
  renderBatches();
}

function getBatch(id) { return batches.find(b => b.id === id); }

function addFiles(id, fileArr) {
  const b = getBatch(id);
  if (!b) return;
  const newFiles = fileArr.filter(f => f.name.toLowerCase().endsWith('.xml'));
  b.files = [...b.files, ...newFiles];
  renderBatches();
}

function removeFile(batchId, fileIdx) {
  const b = getBatch(batchId);
  if (!b) return;
  b.files.splice(fileIdx, 1);
  renderBatches();
}

function updateCf(id, val) {
  const b = getBatch(id);
  if (b) b.cf = val.toUpperCase();
  updateCfHint(id, val.toUpperCase());
  checkReady();
}

// ── Render ────────────────────────────────────────────────────────────────
function renderBatches() {
  const container = document.getElementById('batchList');
  container.innerHTML = batches.map((b, bi) => `
    <div class="batch-row" id="batch-${b.id}">
      <div class="batch-header">
        <span class="batch-num">TIN ${bi + 1}</span>
        <div class="batch-cf-wrap">
          <label>TIN Fornitore</label>
          <input type="text" class="batch-cf" id="cf-input-${b.id}"
            placeholder="11 cifre (P.IVA) o 16 alfanum (CF pers.)"
            value="${escHtml(b.cf)}"
            maxlength="16"
            oninput="updateCf(${b.id}, this.value)"
          />
          <div class="cf-hint ${cfHintClass(b.cf)}" id="cf-hint-${b.id}">${cfHintText(b.cf)}</div>
        </div>
        ${batches.length > 1 ? `<button class="batch-del" onclick="removeBatch(${b.id})" title="Rimuovi questo lotto">✕</button>` : ''}
      </div>
      <div class="batch-body">
        <div class="drop" id="drop-${b.id}"
          ondragover="ev(event,'over',${b.id})"
          ondragleave="ev(event,'leave',${b.id})"
          ondrop="ev(event,'drop',${b.id})">
          <input type="file" accept=".xml" multiple onchange="onFileInput(${b.id},this)"/>
          <div class="drop-icon">📂</div>
          <div class="drop-text"><strong>Trascina XML</strong> o clicca per selezionare</div>
        </div>
        <div class="flist">
          ${b.files.map((f, fi) => `
            <div class="fitem">
              <span>📄</span>
              <span class="fn">${escHtml(f.name)}</span>
              <span class="fs">${(f.size/1024).toFixed(1)} KB</span>
              <span class="fx" onclick="removeFile(${b.id},${fi})">✕</span>
            </div>`).join('')}
        </div>
      </div>
    </div>`).join('');
  checkReady();
}

function ev(e, type, id) {
  e.preventDefault();
  const el = document.getElementById('drop-' + id);
  if (type === 'over') el.classList.add('over');
  else if (type === 'leave') el.classList.remove('over');
  else if (type === 'drop') {
    el.classList.remove('over');
    addFiles(id, [...e.dataTransfer.files]);
  }
}

function onFileInput(id, input) {
  addFiles(id, [...input.files]);
  input.value = '';
}

// ── CF validation ────────────────────────────────────────────────────────────
function isCfValid(cf) {
  const v = cf.trim().toUpperCase();
  return /^[0-9]{11}$/.test(v) || /^[A-Z0-9]{16}$/.test(v);
}

function cfHintClass(cf) {
  const v = cf.trim().toUpperCase();
  if (!v) return 'neutral';
  if (/^[0-9]{11}$/.test(v)) return 'ok';
  if (/^[A-Z0-9]{16}$/.test(v)) return 'ok';
  // Partial states
  if (/^[0-9]+$/.test(v)) return v.length < 11 ? 'neutral' : 'err';
  if (/^[A-Z0-9]+$/.test(v)) return v.length < 16 ? 'neutral' : 'err';
  return 'err';
}

function cfHintText(cf) {
  const v = cf.trim().toUpperCase();
  if (!v) return '';
  if (/^[0-9]{11}$/.test(v)) return '✓ TIN valido — P.IVA (11 cifre)';
  if (/^[A-Z0-9]{16}$/.test(v)) return '✓ TIN valido — CF persona fisica (16 car.)';
  if (/^[0-9]+$/.test(v)) {
    const rem = 11 - v.length;
    if (rem > 0) return `TIN (P.IVA) — ancora ${rem} cifr${rem===1?'a':'e'}`;
    return '✗ P.IVA: esattamente 11 cifre numeriche';
  }
  if (/^[A-Z0-9]+$/.test(v)) {
    const rem = 16 - v.length;
    if (rem > 0) return `TIN (CF) — ancora ${rem} caratteri`;
    return '✗ CF: esattamente 16 caratteri alfanumerici';
  }
  return '✗ TIN non valido — solo cifre (11) o alfanum. maiusc. (16)';
}

function updateCfHint(id, val) {
  const inp = document.getElementById('cf-input-' + id);
  const hint = document.getElementById('cf-hint-' + id);
  if (!inp || !hint) return;
  const cls = cfHintClass(val);
  inp.className = 'batch-cf' + (cls === 'ok' ? ' valid' : cls === 'err' ? ' invalid' : '');
  hint.className = 'cf-hint ' + cls;
  hint.textContent = cfHintText(val);
}

function checkReady() {
  const withFiles = batches.filter(b => b.files.length > 0);
  // Must have at least one batch with files AND a valid TIN
  const hasValidBatch = withFiles.some(b => isCfValid(b.cf));
  // No batch with files can have an invalid (non-empty, non-valid) TIN
  const hasInvalidTin = withFiles.some(b => b.cf.trim() !== '' && !isCfValid(b.cf));
  document.getElementById('btnGo').disabled = !hasValidBatch || hasInvalidTin;
}

function resetAll() {
  batches = [];
  batchIdSeq = 0;
  addBatch();
  document.getElementById('prog').classList.remove('on');
  document.getElementById('log').textContent = '';
  document.getElementById('resultsWrap').innerHTML = '';
  document.getElementById('resultsWrap').style.display = 'none';
  llen = 0;
  ['s1','s2','s3'].forEach(id => document.getElementById(id).className = 'step');
}

// ── Upload & pipeline ──────────────────────────────────────────────────────
async function go() {
  const activeBatches = batches.filter(b => b.files.length > 0 && isCfValid(b.cf));
  if (!activeBatches.length) { alert('Aggiungere almeno un file XML con TIN valido.'); return; }

  const fd = new FormData();
  activeBatches.forEach(b => {
    b.files.forEach(f => {
      fd.append('xml_files', f);
      fd.append('cf_map', b.cf.trim().toUpperCase()); // parallel array: cf_map[i] corresponds to xml_files[i]
    });
  });
  // Also send batch metadata as JSON for display in output
  const batchMeta = activeBatches.flatMap(b =>
    b.files.map(f => ({ filename: f.name, cf: b.cf.trim().toUpperCase() }))
  );
  fd.append('batch_meta', JSON.stringify(batchMeta));

  document.getElementById('btnGo').disabled = true;
  document.getElementById('prog').classList.add('on');
  document.getElementById('log').textContent = '';
  document.getElementById('resultsWrap').innerHTML = '';
  document.getElementById('resultsWrap').style.display = 'none';
  llen = 0;
  setBadge('PENDING');
  ['s1','s2','s3'].forEach(id => document.getElementById(id).className = 'step');

  try {
    const r = await fetch('/upload', { method: 'POST', body: fd });
    const d = await r.json();
    if (!r.ok) { alert(d.error || 'Errore upload'); document.getElementById('btnGo').disabled = false; return; }
    jid = d.job_id;
    window._batchMeta = batchMeta; // keep for output grouping
    addLog('Job avviato · ' + d.files.length + ' file · ' + activeBatches.length + ' TIN');
    llen = 1;
    if (poll) clearInterval(poll);
    poll = setInterval(tick, 2000);
  } catch(e) {
    alert('Errore rete: ' + e.message);
    document.getElementById('btnGo').disabled = false;
  }
}

async function tick() {
  try {
    const d = await (await fetch('/status/' + jid)).json();
    setBadge(d.status);
    if (d.elapsed) document.getElementById('el').textContent = d.elapsed + 's';

    const newLines = d.log.slice(llen);
    newLines.forEach(l => addLog(l));
    llen = d.log.length;

    // Step tracker — rough heuristic on log content
    const j = d.log.join('\n');
    updateStep('s1', j, 'Step 1');
    updateStep('s2', j, 'Step 2');
    updateStep('s3', j, 'Step 3');

    if (d.status === 'COMPLETED' || d.status === 'FAILED') {
      clearInterval(poll);
      document.getElementById('btnGo').disabled = false;
      if (d.outputs && d.outputs.length) showResults(jid, d.outputs);
      if (d.error) addLog('ERRORE: ' + d.error);
    }
  } catch(e) { console.error(e); }
}

function updateStep(stepId, log, label) {
  const idx = log.indexOf(label);
  if (idx === -1) return;
  const afterIdx = log.indexOf('✓', idx);
  const errIdx = log.indexOf('✗', idx);
  const el = document.getElementById(stepId);
  if (afterIdx !== -1 && (errIdx === -1 || afterIdx < errIdx)) el.className = 'step done';
  else if (errIdx !== -1) el.className = 'step error';
  else el.className = 'step active';
}

// ── Output display — grouped by source XML ────────────────────────────────
function showResults(jid, outputs) {
  const meta = window._batchMeta || [];

  // Group outputs by stem (filename without extension and suffix)
  // label format: "[stem] Validazione" / "[stem] Shell MSG" / "[stem] Report HTML"
  const groups = {};
  outputs.forEach(o => {
    const m = o.label.match(/^\[([^\]]+)\]/);
    const stem = m ? m[1] : 'output';
    if (!groups[stem]) groups[stem] = { stem, outputs: [], cf: '' };
    groups[stem].outputs.push(o);
    // Try to find CF from batchMeta
    const metaItem = meta.find(x => x.filename.replace(/\.xml$/i,'') === stem);
    if (metaItem) groups[stem].cf = metaItem.cf;
  });

  const icons = { 'Validazione': '✅', 'Shell': '📦', 'Report': '📊' };
  const typeLabel = { 'Validazione': 'Validazione XLSX', 'Shell': 'Shell MSG XML', 'Report': 'Report HTML' };

  const html = Object.values(groups).map(g => `
    <div class="result-group">
      <div class="result-group-head">
        <span class="result-group-icon">📄</span>
        <span class="result-group-name">${escHtml(g.stem)}.xml</span>
        ${g.cf ? `<span class="result-group-cf">TIN: ${escHtml(g.cf)}</span>` : ''}
      </div>
      <div class="result-group-body">
        ${g.outputs.map(o => {
          const key = Object.keys(icons).find(k => o.label.includes(k)) || '';
          const icon = icons[key] || '📄';
          const type = typeLabel[key] || o.label;
          return `<div class="ocard">
            <div class="otype">${icon} ${type}</div>
            <div class="oname">${escHtml(o.filename)}</div>
            <a class="odl" href="/download/${jid}/${encodeURIComponent(o.filename)}" download>⬇ Scarica</a>
          </div>`;
        }).join('')}
      </div>
    </div>`).join('');

  const wrap = document.getElementById('resultsWrap');
  wrap.innerHTML = `<div style="font-size:0.72rem;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px">File prodotti</div>` + html;
  wrap.style.display = 'flex';
}

// ── Helpers ────────────────────────────────────────────────────────────────
function addLog(l) {
  const b = document.getElementById('log');
  b.textContent += l + '\n';
  b.scrollTop = b.scrollHeight;
}
function setBadge(s) {
  const b = document.getElementById('badge'), t = document.getElementById('btext'), sp = document.getElementById('spin');
  b.className = 'sbadge ' + s;
  t.textContent = { PENDING:'In attesa', RUNNING:'In esecuzione', COMPLETED:'Completato', FAILED:'Errore' }[s] || s;
  sp.style.display = (s === 'RUNNING' || s === 'PENDING') ? 'block' : 'none';
}
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function pad(n) { return String(n).padStart(2,'0'); }
(function tick() {
  const d = new Date();
  document.getElementById('ts').textContent = pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+d.getFullYear()+' '+pad(d.getHours())+':'+pad(d.getMinutes());
  setTimeout(tick, 30000);
})();
</script>
